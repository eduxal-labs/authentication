AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: Eduxal - Authentication Service
Resources:
  VerificationsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: eduxal-Verifications
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
      - AttributeName: pk
        AttributeType: S
      KeySchema:
      - AttributeName: pk
        KeyType: HASH
      TimeToLiveSpecification:
        AttributeName: expiresAt
        Enabled: true
  AuthenticationFunction:
    Type: AWS::Serverless::Function
    Metadata:
      BuildMethod: rust-cargolambda
      BuildProperties:
        Binary: authentication
      SamResourceId: AuthenticationFunction
    Properties:
      FunctionName: eduxal-authentication
      CodeUri: AuthenticationFunction
      Handler: bootstrap
      Runtime: provided.al2023
      Architectures:
      - arm64
      Timeout: 29
      MemorySize: 256
      Tracing: Active
      Environment:
        Variables:
          USERS_TABLE:
            Fn::ImportValue: eduxal-UsersTableName
          VERIFICATIONS_TABLE:
            Ref: VerificationsTable
          RUST_LOG: info
      FunctionUrlConfig:
        AuthType: NONE
        Cors:
          AllowOrigins:
          - https://eduxal.com
          AllowMethods:
          - GET
          - POST
          - OPTIONS
          AllowHeaders:
          - Content-Type
          - Authorization
          MaxAge: 86400
      Policies:
      - Statement:
        - Effect: Allow
          Action:
          - dynamodb:GetItem
          - dynamodb:PutItem
          - dynamodb:UpdateItem
          - dynamodb:Query
          - dynamodb:BatchGetItem
          Resource:
          - Fn::Sub:
            - arn:${AWS::Partition}:dynamodb:${AWS::Region}:${AWS::AccountId}:table/${TableName}
            - TableName:
                Fn::ImportValue: eduxal-UsersTableName
          - Fn::Sub:
            - arn:${AWS::Partition}:dynamodb:${AWS::Region}:${AWS::AccountId}:table/${TableName}/index/*
            - TableName:
                Fn::ImportValue: eduxal-UsersTableName
      - DynamoDBCrudPolicy:
          TableName:
            Ref: VerificationsTable
Outputs:
  AuthFunctionArn:
    Description: Authentication Lambda ARN
    Value:
      Fn::GetAtt:
      - AuthenticationFunction
      - Arn
    Export:
      Name: eduxal-AuthFunctionArn
  AuthFunctionUrlEndpoint:
    Description: Authentication Lambda Function URL
    Value:
      Fn::GetAtt:
      - AuthenticationFunctionUrl
      - FunctionUrl
    Export:
      Name: eduxal-AuthFunctionUrlEndpoint
