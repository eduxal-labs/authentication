name: Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  deploy:
    name: Build & Deploy to Cloudflare
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      # ── Pre-flight: verify the API token works ───────────────────

      - name: Verify Cloudflare authentication
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          RESPONSE=$(curl -sf "https://api.cloudflare.com/client/v4/user/tokens/verify" \
            -H "Authorization: Bearer $CLOUDFLARE_API_TOKEN")
          STATUS=$(echo "$RESPONSE" | jq -r '.result.status // .success')
          if [ "$STATUS" != "active" ] && [ "$STATUS" != "true" ]; then
            echo "Token verification failed:"
            echo "$RESPONSE" | jq .
            exit 1
          fi
          echo "Cloudflare API token verified successfully"

      # ── One-time resource setup (idempotent — skips if already exists) ──

      - name: Create KV namespace (if missing)
        id: kv
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          set -euo pipefail

          # Extract current KV ID from wrangler.toml
          KV_ID=$(grep -A1 'VERIFICATION_KV' wrangler.toml | grep 'id =' | sed 's/.*id = "\(.*\)"/\1/')

          if [ -z "$KV_ID" ] || [ "$KV_ID" = "<PASTE_KV_ID_HERE>" ]; then
            echo "Creating KV namespace VERIFICATION_KV..."
            CREATE_OUTPUT=$(npx wrangler kv:namespace create VERIFICATION_KV)
            echo "$CREATE_OUTPUT"

            # Extract ID from wrangler output — matches: id = "abc123..."
            KV_ID=$(echo "$CREATE_OUTPUT" | grep -Eo 'id = "[^"]+"' | head -1 | sed 's/id = "\(.*\)"/\1/')

            if [ -z "$KV_ID" ]; then
              echo "ERROR: Failed to extract KV namespace ID from wrangler output"
              exit 1
            fi

            sed -i "s/id = \".*\"/id = \"$KV_ID\"/" wrangler.toml
            sed -i "s/preview_id = \".*\"/preview_id = \"$KV_ID\"/" wrangler.toml
            echo "KV namespace created: $KV_ID"
          else
            echo "KV namespace already configured: $KV_ID"
          fi
          echo "kv_id=$KV_ID" >> $GITHUB_OUTPUT

      - name: Create D1 database (if missing)
        id: d1
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          set -euo pipefail

          # Extract current D1 database ID from wrangler.toml
          DB_ID=$(grep -A1 'database_id' wrangler.toml | grep 'database_id =' | sed 's/.*database_id = "\(.*\)"/\1/')

          if [ -z "$DB_ID" ] || [ "$DB_ID" = "<PASTE_D1_ID_HERE>" ]; then
            echo "Creating D1 database eduxal..."
            CREATE_OUTPUT=$(npx wrangler d1 create eduxal)
            echo "$CREATE_OUTPUT"

            # Extract ID from wrangler output — matches: database_id = "abc123..."
            DB_ID=$(echo "$CREATE_OUTPUT" | grep -Eo 'database_id = "[^"]+"' | head -1 | sed 's/database_id = "\(.*\)"/\1/')

            if [ -z "$DB_ID" ]; then
              echo "ERROR: Failed to extract D1 database ID from wrangler output"
              exit 1
            fi

            sed -i "s/database_id = \".*\"/database_id = \"$DB_ID\"/" wrangler.toml
            echo "D1 database created: $DB_ID"
          else
            echo "D1 database already configured: $DB_ID"
          fi
          echo "db_id=$DB_ID" >> $GITHUB_OUTPUT

      - name: Run D1 migrations
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: npx wrangler d1 execute eduxal --file=./schema.sql

      # ── Secret mapping: GitHub Secrets → Cloudflare Worker secrets ──

      - name: Set Worker secrets
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          echo "${{ secrets.WHATSAPP_TOKEN }}" | npx wrangler secret put WHATSAPP_TOKEN
          echo "${{ secrets.PASETO_PASSWORD }}" | npx wrangler secret put JWT_SECRET

      # ── Deploy ──

      - name: Deploy Worker
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: npx wrangler deploy

      # ── Custom domain: auth.eduxal.com → Worker ─────────────────

      - name: Fetch Worker route ID and pattern
        id: worker-info
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          # Get the workers.dev subdomain
          RESPONSE=$(curl -sf \
            "https://api.cloudflare.com/client/v4/accounts/${{ secrets.CLOUDFLARE_ACCOUNT_ID }}/workers/scripts/eduxal-auth-worker/subdomain" \
            -H "Authorization: Bearer $CLOUDFLARE_API_TOKEN")
          WORKERS_DEV=$(echo "$RESPONSE" | jq -r '.result.subdomain')
          echo "workers_dev=${WORKERS_DEV}.workers.dev" >> $GITHUB_OUTPUT
          echo "workers_dev=${WORKERS_DEV}.workers.dev"

      - name: Upsert proxied DNS record for auth.eduxal.com
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CF_ZONE: ${{ secrets.CLOUDFLARE_ZONE_ID }}
        run: |
          TARGET="${{ steps.worker-info.outputs.workers_dev }}"
          echo "Target: $TARGET"

          # Check if DNS record already exists
          RECORD_ID=$(curl -sf \
            "https://api.cloudflare.com/client/v4/zones/$CF_ZONE/dns_records?type=CNAME&name=auth.eduxal.com" \
            -H "Authorization: Bearer $CLOUDFLARE_API_TOKEN" | jq -r '.result[0].id // empty')

          PAYLOAD=$(jq -n \
            --arg target "$TARGET" \
            '{type: "CNAME", name: "auth", content: $target, proxied: true, ttl: 1}')

          if [ -n "$RECORD_ID" ]; then
            echo "Updating existing CNAME $RECORD_ID → $TARGET"
            RESPONSE=$(curl -s -X PUT \
              "https://api.cloudflare.com/client/v4/zones/$CF_ZONE/dns_records/$RECORD_ID" \
              -H "Authorization: Bearer $CLOUDFLARE_API_TOKEN" \
              -H "Content-Type: application/json" \
              -d "$PAYLOAD")
          else
            echo "Creating new CNAME auth.eduxal.com → $TARGET"
            RESPONSE=$(curl -s -X POST \
              "https://api.cloudflare.com/client/v4/zones/$CF_ZONE/dns_records" \
              -H "Authorization: Bearer $CLOUDFLARE_API_TOKEN" \
              -H "Content-Type: application/json" \
              -d "$PAYLOAD")
          fi

          SUCCESS=$(echo "$RESPONSE" | jq -r '.success')
          if [ "$SUCCESS" != "true" ]; then
            echo "DNS record upsert failed:"
            echo "$RESPONSE" | jq '.errors'
            exit 1
          fi
          echo "DNS record active: auth.eduxal.com → $TARGET (proxied)"

      - name: Upsert Worker Route (auth.eduxal.com/* → worker)
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          ROUTE_PATTERN="auth.eduxal.com/*"
          ACCOUNT_ID="${{ secrets.CLOUDFLARE_ACCOUNT_ID }}"
          ZONE_ID="${{ secrets.CLOUDFLARE_ZONE_ID }}"

          # List existing routes and find ours
          EXISTING=$(curl -sf \
            "https://api.cloudflare.com/client/v4/zones/$ZONE_ID/workers/routes" \
            -H "Authorization: Bearer $CLOUDFLARE_API_TOKEN")

          ROUTE_ID=$(echo "$EXISTING" | jq -r --arg pat "$ROUTE_PATTERN" \
            '.result[] | select(.pattern == $pat) | .id // empty' | head -1)

          if [ -n "$ROUTE_ID" ]; then
            echo "Updating existing Worker route $ROUTE_ID"
            RESPONSE=$(curl -s -X PUT \
              "https://api.cloudflare.com/client/v4/zones/$ZONE_ID/workers/routes/$ROUTE_ID" \
              -H "Authorization: Bearer $CLOUDFLARE_API_TOKEN" \
              -H "Content-Type: application/json" \
              -d "$(jq -n --arg pattern "$ROUTE_PATTERN" --arg script eduxal-auth-worker \
                '{pattern: $pattern, script: $script}')")
          else
            echo "Creating new Worker route: $ROUTE_PATTERN → eduxal-auth-worker"
            RESPONSE=$(curl -s -X POST \
              "https://api.cloudflare.com/client/v4/zones/$ZONE_ID/workers/routes" \
              -H "Authorization: Bearer $CLOUDFLARE_API_TOKEN" \
              -H "Content-Type: application/json" \
              -d "$(jq -n --arg pattern "$ROUTE_PATTERN" --arg script eduxal-auth-worker \
                '{pattern: $pattern, script: $script}')")
          fi

          SUCCESS=$(echo "$RESPONSE" | jq -r '.success')
          if [ "$SUCCESS" != "true" ]; then
            echo "Worker route upsert failed:"
            echo "$RESPONSE" | jq '.errors'
            exit 1
          fi
          echo "Worker route active: $ROUTE_PATTERN → eduxal-auth-worker"
