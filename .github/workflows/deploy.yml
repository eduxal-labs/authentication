name: Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  deploy:
    name: Build & Deploy to Cloudflare
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      # ── Pre-flight: verify auth and resolve account ─────────────

      - name: Verify Cloudflare authentication
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          set -euo pipefail
          echo "Checking Cloudflare auth with wrangler whoami..."
          npx wrangler whoami

      - name: Resolve Cloudflare Account ID
        id: account
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          set -euo pipefail
          RESPONSE=$(curl -sf \
            "https://api.cloudflare.com/client/v4/accounts" \
            -H "Authorization: Bearer $CLOUDFLARE_API_TOKEN")
          ACCOUNT_ID=$(echo "$RESPONSE" | jq -r '.result[0].id')
          if [ -z "$ACCOUNT_ID" ] || [ "$ACCOUNT_ID" = "null" ]; then
            echo "ERROR: Could not determine account ID from token"
            echo "$RESPONSE" | jq .
            exit 1
          fi
          echo "Account ID: $ACCOUNT_ID"
          echo "account_id=$ACCOUNT_ID" >> $GITHUB_OUTPUT

      # ── One-time resource setup (idempotent) ─────────────────────

      - name: Create KV namespace (if missing)
        id: kv
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          set -euo pipefail
          ACCOUNT_ID="${{ steps.account.outputs.account_id }}"

          KV_ID=$(grep -A1 'VERIFICATION_KV' wrangler.toml | grep 'id =' | sed 's/.*id = "\(.*\)"/\1/')

          if [ -z "$KV_ID" ] || [ "$KV_ID" = "<PASTE_KV_ID_HERE>" ]; then
            echo "Looking up or creating KV namespace VERIFICATION_KV..."

            # First try to find an existing namespace with this title
            LIST=$(curl -sf \
              "https://api.cloudflare.com/client/v4/accounts/$ACCOUNT_ID/storage/kv/namespaces" \
              -H "Authorization: Bearer $CLOUDFLARE_API_TOKEN")
            KV_ID=$(echo "$LIST" | jq -r '.result[] | select(.title == "VERIFICATION_KV") | .id // empty')

            if [ -n "$KV_ID" ]; then
              echo "Found existing KV namespace: $KV_ID"
            else
              echo "Creating new KV namespace VERIFICATION_KV..."
              RESPONSE=$(curl -s -X POST \
                "https://api.cloudflare.com/client/v4/accounts/$ACCOUNT_ID/storage/kv/namespaces" \
                -H "Authorization: Bearer $CLOUDFLARE_API_TOKEN" \
                -H "Content-Type: application/json" \
                -d '{"title":"VERIFICATION_KV"}')
              echo "$RESPONSE" | jq .
              SUCCESS=$(echo "$RESPONSE" | jq -r '.success')
              if [ "$SUCCESS" != "true" ]; then
                echo "ERROR: Failed to create KV namespace"
                exit 1
              fi
              KV_ID=$(echo "$RESPONSE" | jq -r '.result.id')
              echo "KV namespace created: $KV_ID"
            fi

            sed -i "s/^id = \".*\"/id = \"$KV_ID\"/" wrangler.toml
            sed -i "s/^preview_id = \".*\"/preview_id = \"$KV_ID\"/" wrangler.toml
          else
            echo "KV namespace already configured: $KV_ID"
          fi
          echo "kv_id=$KV_ID" >> $GITHUB_OUTPUT

      - name: Create D1 database (if missing)
        id: d1
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          set -euo pipefail
          ACCOUNT_ID="${{ steps.account.outputs.account_id }}"

          DB_ID=$(grep -A1 'database_id' wrangler.toml | grep 'database_id =' | sed 's/.*database_id = "\(.*\)"/\1/')

          NEEDS_CREATE=false
          if [ -z "$DB_ID" ] || [ "$DB_ID" = "<PASTE_D1_ID_HERE>" ]; then
            NEEDS_CREATE=true
          else
            # Verify the database actually exists (catches corrupted IDs)
            CHECK=$(curl -sf \
              "https://api.cloudflare.com/client/v4/accounts/$ACCOUNT_ID/d1/database/$DB_ID" \
              -H "Authorization: Bearer $CLOUDFLARE_API_TOKEN" || true)
            CHECK_SUCCESS=$(echo "$CHECK" | jq -r '.success // false')
            if [ "$CHECK_SUCCESS" != "true" ]; then
              echo "Database $DB_ID not found (may be corrupted), recreating..."
              NEEDS_CREATE=true
            fi
          fi

          if [ "$NEEDS_CREATE" = "true" ]; then
            echo "Looking up or creating D1 database eduxal..."

            # First try to find an existing database with this name
            LIST=$(curl -sf \
              "https://api.cloudflare.com/client/v4/accounts/$ACCOUNT_ID/d1/database" \
              -H "Authorization: Bearer $CLOUDFLARE_API_TOKEN")
            DB_ID=$(echo "$LIST" | jq -r '.result[] | select(.name == "eduxal") | .uuid // empty')

            if [ -n "$DB_ID" ]; then
              echo "Found existing D1 database eduxal: $DB_ID"
            else
              echo "Creating new D1 database eduxal..."
              RESPONSE=$(curl -s -X POST \
                "https://api.cloudflare.com/client/v4/accounts/$ACCOUNT_ID/d1/database" \
                -H "Authorization: Bearer $CLOUDFLARE_API_TOKEN" \
                -H "Content-Type: application/json" \
                -d '{"name":"eduxal"}')
              echo "$RESPONSE" | jq .
              SUCCESS=$(echo "$RESPONSE" | jq -r '.success')
              if [ "$SUCCESS" != "true" ]; then
                echo "ERROR: Failed to create D1 database"
                exit 1
              fi
              DB_ID=$(echo "$RESPONSE" | jq -r '.result.uuid')
              echo "D1 database created: $DB_ID"
            fi

            sed -i "s/^database_id = \".*\"/database_id = \"$DB_ID\"/" wrangler.toml
          else
            echo "D1 database already configured and verified: $DB_ID"
          fi
          echo "db_id=$DB_ID" >> $GITHUB_OUTPUT

      - name: Run D1 migrations
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: npx wrangler d1 execute eduxal --file=./schema.sql

      # ── Secret mapping ───────────────────────────────────────────

      - name: Set Worker secrets
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          echo "${{ secrets.WHATSAPP_TOKEN }}" | npx wrangler secret put WHATSAPP_TOKEN
          echo "${{ secrets.PASETO_PASSWORD }}" | npx wrangler secret put JWT_SECRET

      # ── Deploy ───────────────────────────────────────────────────

      - name: Deploy Worker
        id: deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: npx wrangler deploy

      # ── Custom domain: auth.eduxal.com -> Worker ─────────────────

      - name: Upsert proxied DNS record for auth.eduxal.com
        if: success() && steps.deploy.outcome == 'success'
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CF_ZONE: ${{ secrets.CLOUDFLARE_ZONE_ID }}
        run: |
          set -euo pipefail
          # Proxied-only: A record target is a dummy — Worker Route handles traffic
          DUMMY_IP="192.0.2.1"

          RECORD_ID=$(curl -sf \
            "https://api.cloudflare.com/client/v4/zones/$CF_ZONE/dns_records?type=A&name=auth.eduxal.com" \
            -H "Authorization: Bearer $CLOUDFLARE_API_TOKEN" | jq -r '.result[0].id // empty')

          PAYLOAD=$(jq -n \
            --arg content "$DUMMY_IP" \
            '{type: "A", name: "auth", content: $content, proxied: true, ttl: 1}')

          if [ -n "$RECORD_ID" ]; then
            echo "Updating existing A record $RECORD_ID"
            RESPONSE=$(curl -s -X PUT \
              "https://api.cloudflare.com/client/v4/zones/$CF_ZONE/dns_records/$RECORD_ID" \
              -H "Authorization: Bearer $CLOUDFLARE_API_TOKEN" \
              -H "Content-Type: application/json" \
              -d "$PAYLOAD")
          else
            echo "Creating proxied A record auth.eduxal.com -> $DUMMY_IP"
            RESPONSE=$(curl -s -X POST \
              "https://api.cloudflare.com/client/v4/zones/$CF_ZONE/dns_records" \
              -H "Authorization: Bearer $CLOUDFLARE_API_TOKEN" \
              -H "Content-Type: application/json" \
              -d "$PAYLOAD")
          fi

          SUCCESS=$(echo "$RESPONSE" | jq -r '.success')
          if [ "$SUCCESS" != "true" ]; then
            echo "DNS record upsert failed:"
            echo "$RESPONSE" | jq '.errors'
            exit 1
          fi
          echo "DNS record active: auth.eduxal.com (proxied)"

      - name: Upsert Worker Route (auth.eduxal.com/* -> worker)
        if: success() && steps.deploy.outcome == 'success'
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          ROUTE_PATTERN="auth.eduxal.com/*"
          ACCOUNT_ID="${{ steps.account.outputs.account_id }}"
          ZONE_ID="${{ secrets.CLOUDFLARE_ZONE_ID }}"

          EXISTING=$(curl -sf \
            "https://api.cloudflare.com/client/v4/zones/$ZONE_ID/workers/routes" \
            -H "Authorization: Bearer $CLOUDFLARE_API_TOKEN")

          ROUTE_ID=$(echo "$EXISTING" | jq -r --arg pat "$ROUTE_PATTERN" \
            '.result[] | select(.pattern == $pat) | .id // empty' | head -1)

          if [ -n "$ROUTE_ID" ]; then
            echo "Updating existing Worker route $ROUTE_ID"
            RESPONSE=$(curl -s -X PUT \
              "https://api.cloudflare.com/client/v4/zones/$ZONE_ID/workers/routes/$ROUTE_ID" \
              -H "Authorization: Bearer $CLOUDFLARE_API_TOKEN" \
              -H "Content-Type: application/json" \
              -d "$(jq -n --arg pattern "$ROUTE_PATTERN" --arg script eduxal-auth-worker \
                '{pattern: $pattern, script: $script}')")
          else
            echo "Creating new Worker route: $ROUTE_PATTERN -> eduxal-auth-worker"
            RESPONSE=$(curl -s -X POST \
              "https://api.cloudflare.com/client/v4/zones/$ZONE_ID/workers/routes" \
              -H "Authorization: Bearer $CLOUDFLARE_API_TOKEN" \
              -H "Content-Type: application/json" \
              -d "$(jq -n --arg pattern "$ROUTE_PATTERN" --arg script eduxal-auth-worker \
                '{pattern: $pattern, script: $script}')")
          fi

          SUCCESS=$(echo "$RESPONSE" | jq -r '.success')
          if [ "$SUCCESS" != "true" ]; then
            echo "Worker route upsert failed:"
            echo "$RESPONSE" | jq '.errors'
            exit 1
          fi
          echo "Worker route active: $ROUTE_PATTERN -> eduxal-auth-worker"
