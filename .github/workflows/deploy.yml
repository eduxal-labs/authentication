name: Deploy

on:
  push:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2

      - name: Install cargo-lambda
        run: pip3 install cargo-lambda

      # Requires a GitHub OIDC provider and IAM role configured in AWS.
      # Store the role ARN as AWS_DEPLOY_ROLE_ARN in GitHub secrets.
      # See: https://docs.github.com/en/actions/security-for-github-actions/security-hardening-your-deployments/configuring-openid-connect-in-amazon-web-services
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: us-east-1

      - name: Setup SAM CLI
        uses: aws-actions/setup-sam@v2
        with:
          use-installer: true

      # sam build invokes cargo-lambda internally via BuildMethod: rust-cargolambda
      - name: Build
        env:
          WHATSAPP_TOKEN: ${{ secrets.WHATSAPP_TOKEN }}
          PASETO_PASSWORD: ${{ secrets.PASETO_PASSWORD }}
        run: sam build

      - name: Deploy
        run: sam deploy

      # The Lambda Function URL hostname is stable between deployments.
      # between deployments, only if the stack is deleted and recreated.
      # We upsert on every deploy so a brand-new stack gets its DNS record automatically.
      # DNS record automatically.
      - name: Get Function URL Hostname
        id: fn
        run: |
          HOST=$(aws cloudformation describe-stacks \
            --stack-name eduxal-authentication \
            --query "Stacks[0].Outputs[?OutputKey=='AuthFunctionUrl'].OutputValue" \
            --output text | sed 's|https://||' | sed 's|/$||')
          echo "host=$HOST" >> $GITHUB_OUTPUT

      # Cloudflare proxied=true means Cloudflare terminates TLS for
      # auth.eduxal.com and forwards to the Lambda Function URL hostname.
      - name: Upsert Cloudflare CNAME record
        env:
          CF_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CF_ZONE: ${{ secrets.CLOUDFLARE_ZONE_ID }}
          CF_HOST: ${{ steps.fn.outputs.host }}
        run: |
          RECORD_ID=$(curl -sf \
            "https://api.cloudflare.com/client/v4/zones/$CF_ZONE/dns_records?type=CNAME&name=auth.eduxal.com" \
            -H "Authorization: Bearer $CF_TOKEN" | jq -r ".result[0].id // empty")

          PAYLOAD=$(jq -n \
            --arg host "$CF_HOST" \
            '{"type": "CNAME", "name": "auth", "content": $host, "proxied": true, "ttl": 1}')

          if [ -n "$RECORD_ID" ]; then
            echo "Updating existing CNAME $RECORD_ID -> $CF_HOST"
            RESPONSE=$(curl -s -X PUT \
              "https://api.cloudflare.com/client/v4/zones/$CF_ZONE/dns_records/$RECORD_ID" \
              -H "Authorization: Bearer $CF_TOKEN" \
              -H "Content-Type: application/json" \
              -d "$PAYLOAD")
          else
            echo "Creating new CNAME auth.eduxal.com -> $CF_HOST"
            RESPONSE=$(curl -s -X POST \
              "https://api.cloudflare.com/client/v4/zones/$CF_ZONE/dns_records" \
              -H "Authorization: Bearer $CF_TOKEN" \
              -H "Content-Type: application/json" \
              -d "$PAYLOAD")
          fi

          echo "Cloudflare response: $RESPONSE"

          SUCCESS=$(echo "$RESPONSE" | jq -r ".success")
          if [ "$SUCCESS" != "true" ]; then
            echo "Cloudflare API call failed:"
            echo "$RESPONSE" | jq ".errors"
            exit 1
          fi
