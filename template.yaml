AWSTemplateFormatVersion: "2010-09-09"
Transform: AWS::Serverless-2016-10-31
Description: Eduxal - Authentication Service

Parameters:
  AcmCertificateArn:
    Type: String
    Description: ACM certificate ARN for auth.eduxal.com (must be in us-east-1)

Resources:
  # ──────────────────────────────────────────────
  # HTTP API Gateway
  # ──────────────────────────────────────────────
  AuthApi:
    Type: AWS::Serverless::HttpApi
    Properties:
      CorsConfiguration:
        AllowOrigins:
          - "*"
        AllowMethods:
          - GET
          - POST
          - PUT
          - DELETE
          - OPTIONS
        AllowHeaders:
          - Content-Type
          - Authorization
        MaxAge: 86400

  AuthApiDomain:
    Type: AWS::ApiGatewayV2::DomainName
    Properties:
      DomainName: auth.eduxal.com
      DomainNameConfigurations:
        - CertificateArn: !Ref AcmCertificateArn
          EndpointType: REGIONAL

  AuthApiMapping:
    Type: AWS::ApiGatewayV2::ApiMapping
    DependsOn: AuthApiApiGatewayDefaultStage
    Properties:
      ApiId: !Ref AuthApi
      DomainName: !Ref AuthApiDomain
      Stage: "$default"

  # ──────────────────────────────────────────────
  # Authentication Lambda
  # ──────────────────────────────────────────────
  AuthenticationFunction:
    Type: AWS::Serverless::Function
    Metadata:
      BuildMethod: rust-cargolambda
      BuildProperties:
        Binary: authentication
    Properties:
      FunctionName: eduxal-authentication
      CodeUri: ./
      Handler: bootstrap
      Runtime: provided.al2023
      Architectures:
        - arm64
      Timeout: 29
      MemorySize: 256
      Tracing: Active
      Environment:
        Variables:
          USERS_TABLE: !ImportValue eduxal-UsersTableName
          VERIFICATIONS_TABLE: !ImportValue eduxal-VerificationsTableName
          SESSIONS_TABLE: !ImportValue eduxal-SessionsTableName
          RUST_LOG: info

      # ── Routes – catch-all proxy to the Lambda ────────────────────────────
      Events:
        ApiRoot:
          Type: HttpApi
          Properties:
            ApiId: !Ref AuthApi
            Path: /
            Method: ANY
        ApiProxy:
          Type: HttpApi
          Properties:
            ApiId: !Ref AuthApi
            Path: /{proxy+}
            Method: ANY

      # ── IAM – read/write on all three tables (index access included) ──────
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !ImportValue eduxal-UsersTableName
        - DynamoDBCrudPolicy:
            TableName: !ImportValue eduxal-VerificationsTableName
        - DynamoDBCrudPolicy:
            TableName: !ImportValue eduxal-SessionsTableName

Outputs:
  AuthApiDomainName:
    Description: API Gateway regional domain name. Set as the Cloudflare CNAME target for auth.eduxal.com.
    Value: !GetAtt AuthApiDomain.RegionalDomainName
    Export:
      Name: eduxal-AuthApiDomainName

  AuthFunctionArn:
    Description: Authentication Lambda ARN
    Value: !GetAtt AuthenticationFunction.Arn
    Export:
      Name: eduxal-AuthFunctionArn
