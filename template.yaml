AWSTemplateFormatVersion: "2010-09-09"
Transform: AWS::Serverless-2016-10-31
Description: Eduxal - Authentication Service

Parameters:
  AcmCertificateArn:
    Type: String
    Description: ACM certificate ARN for auth.eduxal.com (must be in us-east-1)

Resources:
  # ──────────────────────────────────────────────
  # Verifications Table (owned by this service)
  # ──────────────────────────────────────────────
  VerificationsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: eduxal-Verifications
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: pk
          AttributeType: S
      KeySchema:
        - AttributeName: pk
          KeyType: HASH
      TimeToLiveSpecification:
        AttributeName: expiresAt
        Enabled: true

  # ──────────────────────────────────────────────
  # HTTP API
  # ──────────────────────────────────────────────
  AuthApi:
    Type: AWS::Serverless::HttpApi
    Properties:
      StageName: $default
      CorsConfiguration:
        AllowOrigins:
          - "https://eduxal.com"
        AllowHeaders:
          - Content-Type
          - Authorization
        AllowMethods:
          - GET
          - POST
          - OPTIONS

  # ──────────────────────────────────────────────
  # Custom Domain
  # ──────────────────────────────────────────────
  AuthApiDomain:
    Type: AWS::ApiGatewayV2::DomainName
    Properties:
      DomainName: auth.eduxal.com
      DomainNameConfigurations:
        - CertificateArn: !Ref AcmCertificateArn
          EndpointType: REGIONAL

  AuthApiMapping:
    Type: AWS::ApiGatewayV2::ApiMapping
    Properties:
      DomainName: !Ref AuthApiDomain
      ApiId: !Ref AuthApi
      Stage: $default

  # ──────────────────────────────────────────────
  # Authentication Lambda
  # ──────────────────────────────────────────────
  AuthenticationFunction:
    Type: AWS::Serverless::Function
    Metadata:
      BuildMethod: rust-cargolambda
      BuildProperties:
        Binary: authentication
    Properties:
      FunctionName: eduxal-authentication
      CodeUri: ./
      Handler: bootstrap
      Runtime: provided.al2023
      Architectures:
        - arm64
      Timeout: 29
      MemorySize: 256
      Tracing: Active
      Environment:
        Variables:
          USERS_TABLE: !ImportValue eduxal-UsersTableName
          VERIFICATIONS_TABLE: !Ref VerificationsTable
          RUST_LOG: info
      Events:
        ApiProxy:
          Type: HttpApi
          Properties:
            ApiId: !Ref AuthApi
            Path: /{proxy+}
            Method: ANY
        ApiRoot:
          Type: HttpApi
          Properties:
            ApiId: !Ref AuthApi
            Path: /
            Method: ANY

      # ── IAM – least-privilege on Users table; full access on Verifications ─
      Policies:
        - Statement:
            - Effect: Allow
              Action:
                - dynamodb:GetItem
                - dynamodb:PutItem
                - dynamodb:UpdateItem
                - dynamodb:Query
                - dynamodb:BatchGetItem
              Resource:
                - !Sub
                  - "arn:${AWS::Partition}:dynamodb:${AWS::Region}:${AWS::AccountId}:table/${TableName}"
                  - TableName: !ImportValue eduxal-UsersTableName
                - !Sub
                  - "arn:${AWS::Partition}:dynamodb:${AWS::Region}:${AWS::AccountId}:table/${TableName}/index/*"
                  - TableName: !ImportValue eduxal-UsersTableName
        - DynamoDBCrudPolicy:
            TableName: !Ref VerificationsTable

Outputs:
  AuthFunctionArn:
    Description: Authentication Lambda ARN
    Value: !GetAtt AuthenticationFunction.Arn
    Export:
      Name: eduxal-AuthFunctionArn

  AuthApiDomainName:
    Description: >
      API Gateway regional domain name.
      Set this as the Cloudflare CNAME target for auth.eduxal.com.
      Unlike the Lambda Function URL this value never changes between deployments.
    Value: !GetAtt AuthApiDomain.RegionalDomainName
    Export:
      Name: eduxal-AuthApiDomainName
