name = "eduxal-auth-worker"
main = "src/index.ts"
compatibility_date = "2025-05-25"

# ── KV: verification codes (15-min TTL) ──────────────────────────
# Auto-created by CI/CD on first deploy.
[[kv_namespaces]]
binding = "VERIFICATION_KV"
id = "<PASTE_KV_ID_HERE>"
preview_id = "<PASTE_KV_PREVIEW_ID_HERE>"

# ── D1: user data ────────────────────────────────────────────────
# Auto-created by CI/CD on first deploy.
[[d1_databases]]
binding = "DB"
database_name = "eduxal"
database_id = "<PASTE_D1_ID_HERE>"

# ── R2: profile pictures ─────────────────────────────────────────
# Wrangler auto-creates this on first deploy (no manual step needed).
[[r2_buckets]]
binding = "AVATARS_BUCKET"
bucket_name = "eduxal-avatars"

# ── Custom domain route ──────────────────────────────────────────
# CI/CD manages this via Cloudflare API (see deploy.yml).
# The worker serves traffic for auth.eduxal.com/* once the route
# and proxied DNS record are in place.

# ── Environment variables ────────────────────────────────────────
[vars]
WHATSAPP_PHONE_NUMBER_ID = "960426547146856"

# Secrets + API token permissions
# Secrets — set via GitHub Actions (deploy.yml maps GitHub secrets -> wrangler):
#   wrangler secret put WHATSAPP_TOKEN
#   wrangler secret put JWT_SECRET      (from PASETO_PASSWORD)
#
# Token: your CLOUDFLARE_API_TOKEN must have:
#   Account scope: Workers Scripts, KV, D1, R2, Secrets Store, Workers Domains
